<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEFCON.si Icon — Screenshot</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: #1a1f26;
      font-family: "IBM Plex Mono", monospace;
      color: #6B7A8A;
    }
    .canvas {
      background: #0A0E12;
      flex-shrink: 0;
    }
    .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
    }
    .sizes {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: center;
      gap: 3rem;
      padding: 2rem;
    }
    .preview { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    @media print {
      body { background: #0A0E12; }
      .label, h1, p.hint { display: none; }
    }
  </style>
</head>
<body>

  <h1 style="font-size:12px;letter-spacing:0.25em;text-transform:uppercase;color:#FFB000;">DEFCON.si — Icon Export</h1>
  <p class="hint" style="font-size:12px;max-width:28rem;text-align:center;line-height:1.6;">Screenshot the square below for X profile (400×400). Use the large version for headers or OG images.</p>

  <div class="sizes">
    <!-- X profile picture -->
    <div class="preview">
      <div class="canvas" style="width:400px;height:400px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" aria-hidden="true">
          <rect width="400" height="400" rx="75" fill="#0A0E12"/>
          <g transform="translate(50 50) scale(12.5)" fill="none" stroke="#FFB000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
            <path d="M12 8v4"/>
            <path d="M12 16h.01"/>
          </g>
        </svg>
      </div>
      <span class="label">400 × 400 · X profile</span>
    </div>

    <!-- Larger — crop for header / OG -->
    <div class="preview">
      <div class="canvas" style="width:800px;height:800px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" aria-hidden="true">
          <rect width="800" height="800" rx="150" fill="#0A0E12"/>
          <g transform="translate(100 100) scale(25)" fill="none" stroke="#FFB000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
            <path d="M12 8v4"/>
            <path d="M12 16h.01"/>
          </g>
        </svg>
      </div>
      <span class="label">800 × 800 · high-res export</span>
    </div>
  </div>

</body>
</html>
