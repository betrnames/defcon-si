name: Weekly OSINT Assessment Loop (Friday run, posts following day)

on:
  schedule:
    # Runs every Friday at 23:59 UTC (end of the week)
    - cron: '59 23 * * 5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the OSINT updater
        run: node scripts/agent-update.mjs

      - name: Set lastUpdated to the following day at 12:00 UTC
        run: |
          node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync("data.json", "utf8"));
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setUTCHours(12, 0, 0, 0);
            const pad = n => String(n).padStart(2, "0");
            const dateStr = `${tomorrow.getUTCFullYear()}-${pad(tomorrow.getUTCMonth()+1)}-${pad(tomorrow.getUTCDate())} ${pad(tomorrow.getUTCHours())}:${pad(tomorrow.getUTCMinutes())} UTC`;
            data.lastUpdated = dateStr;
            fs.writeFileSync("data.json", JSON.stringify(data, null, 2));
            console.log("Set lastUpdated to", data.lastUpdated);
          '

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: weekly OSINT update (Friday run, posted $(date -u +%F -d \"+1 day\"))"
            git push
            echo "Updated and pushed"
          fi
